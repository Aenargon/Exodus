<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EXODUS - V10.4 FINAL ENGINE</title>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <style>
        :root { --crt-green: #2ecc71; --cold-blue: #a0d2eb; --danger-red: #ff3e3e; --bg: #050805; }
        body { background: var(--bg); color: var(--crt-green); font-family: 'Courier New', monospace; margin: 0; overflow: hidden; text-transform: uppercase; }
        .crt-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03)); background-size: 100% 3px, 3px 100%; pointer-events: none; z-index: 5000; }
        
        .modal { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 5, 0, 0.98); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 3000; padding: 20px; box-sizing: border-box; text-align: center; }
        
        #camera-master { width: 260px; height: 180px; border: 2px solid var(--cold-blue); box-shadow: 0 0 15px var(--cold-blue); background: #000; overflow: hidden; position: relative; margin: 10px 0; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        #ui-wrapper { display: none; flex-direction: column; height: 100vh; position: relative; z-index: 100; }
        #header { height: 50px; border-bottom: 1px solid var(--crt-green); padding: 0 15px; display: flex; justify-content: space-between; align-items: center; background: rgba(0,20,0,0.9); }
        
        .btn-group { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; padding: 10px; flex-grow: 1; }
        button { background: #0d1a0d; color: var(--crt-green); border: 1px solid var(--crt-green); padding: 12px 5px; font-family: inherit; font-size: 9px; border-radius: 4px; cursor: pointer; }
        button:disabled { opacity: 0.3; }
        .btn-main { padding: 20px; font-size: 1.1rem; border-color: #00ffff; color: #00ffff; width: 85%; font-weight: bold; }
        input { background: black; color: var(--crt-green); border: 1px solid var(--crt-green); padding: 15px; text-align: center; font-size: 1.2rem; width: 80%; margin-bottom: 15px; }
        
        #scan-line { position: absolute; width: 100%; height: 4px; background: var(--crt-green); top: 0; display: none; box-shadow: 0 0 15px var(--crt-green); z-index: 1000; animation: moveScan 1.5s linear infinite; }
        @keyframes moveScan { 0% { top: 0%; } 100% { top: 100%; } }
        #debug-log { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(0,0,0,0.9); color: #777; font-size: 7px; padding: 4px; z-index: 6000; pointer-events: none; }
    </style>
</head>
<body>

<div id="debug-log">SISTEMA INACTIVO</div>
<div class="crt-overlay"></div>

<div id="start-screen" class="modal" style="display: flex;">
    <h1 style="color: #00ffff; letter-spacing: 5px;">EXODUS</h1>
    <p>CORE V10.4 [FINAL ENGINE]</p>
    <button onclick="bootSystem()" class="btn-main">INICIAR MISIÓN</button>
</div>

<div id="setup-screen" class="modal">
    <h2 style="color: var(--cold-blue)">CALIBRACIÓN</h2>
    <div id="setup-progress" style="font-size: 4rem; color: white;">0/3</div>
    <div id="camera-anchor-setup"></div>
    <p>ESCANEA 3 CÓDIGOS DE CONSOLA</p>
</div>

<div id="reg-screen" class="modal">
    <h2 id="reg-title">REGISTRO JUGADOR</h2>
    <div id="reg-step-name">
        <input type="text" id="reg-input-name" placeholder="INTRODUCE NOMBRE..." autocomplete="off">
        <button onclick="confirmName()" class="btn-main">VINCULAR ID</button>
    </div>
    <div id="reg-step-card" style="display:none">
        <p style="color: var(--cold-blue)">ESCANEA TU CARTA DE PERSONAJE</p>
        <div id="camera-anchor-reg"></div>
    </div>
</div>

<div id="hub-screen" class="modal">
    <h2 style="color: #00ffff;">ACCESO OPERATIVO</h2>
    <button id="btn-hub-pA" onclick="startLogin('pA')" style="width: 85%; padding: 25px; margin-bottom: 15px; font-size: 1.2rem;">---</button>
    <button id="btn-hub-pB" onclick="startLogin('pB')" style="width: 85%; padding: 25px; font-size: 1.2rem;">---</button>
    <button onclick="location.reload()" style="margin-top: 30px; border-color: var(--danger-red); color: var(--danger-red);">REINICIAR TODO</button>
</div>

<div id="login-screen" class="modal">
    <h2 id="login-title" style="color: var(--cold-blue)">VERIFICACIÓN</h2>
    <div id="camera-anchor-login"></div>
    <p>MUESTRA TU CARTA A LA CÁMARA</p>
    <button onclick="showHub()" style="border-color: #444; color: #444; width: 50%;">CANCELAR</button>
</div>

<div id="ui-wrapper">
    <div id="header">
        <button onclick="showHub()" style="width: 70px; font-size: 8px;">LOGOUT</button>
        <span id="display-name" style="color: #00ffff; font-weight: bold;">---</span>
        <button onclick="toggleBypass()" style="width: 70px; font-size: 8px;">BYPASS</button>
    </div>
    <div style="display: flex; justify-content: center; background: #000; border-bottom: 1px solid #111;">
        <div id="camera-anchor-ui" style="transform: scale(0.9);"></div>
        <div id="scan-line"></div>
    </div>
    <div class="btn-group">
        <button id="btn-bio" onclick="openBio()" style="grid-column: span 3; padding: 20px; border-color: #00ffff; font-weight: bold;">BIO-LOG: ACCEDER AL ARCHIVO</button>
        <button id="btn-scan-NEURONAL" onclick="startScan('NEURONAL')">SCAN NEURONAL<br><span id="res-NEURONAL">--</span></button>
        <button id="btn-scan-EM" onclick="startScan('EM')">SCAN ELECTROMAG.<br><span id="res-EM">--</span></button>
        <button id="btn-scan-MUTAGENO" onclick="startScan('MUTAGENO')">SCAN MUTÁGENO<br><span id="res-MUTAGENO">--</span></button>
    </div>
</div>

<div id="scan-modal" class="modal">
    <h1 id="scan-perc" style="font-size: 5rem; color: white; margin: 0;">0%</h1>
    <p id="scan-msg">ANÁLISIS COMPLETADO</p>
    <button onclick="closeModal('scan-modal')" class="btn-main">VOLVER</button>
</div>

<div id="bypass-screen" class="modal">
    <div id="bp-display" style="font-size: 3rem; border: 1px solid var(--cold-blue); width: 80%; margin-bottom: 20px;">---</div>
    <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 80%;">
        <button onclick="bpKey('1')">1</button><button onclick="bpKey('2')">2</button><button onclick="bpKey('3')">3</button>
        <button onclick="bpKey('4')">4</button><button onclick="bpKey('5')">5</button><button onclick="bpKey('6')">6</button>
        <button onclick="bpKey('7')">7</button><button onclick="bpKey('8')">8</button><button onclick="bpKey('9')">9</button>
        <button onclick="bpClear()" style="color:red">X</button><button onclick="bpKey('0')">0</button><button onclick="bpCheck()" style="color:lime">OK</button>
    </div>
    <button onclick="toggleBypass()" style="margin-top: 20px;">SALIR</button>
</div>

<div id="master-container" style="display:none">
    <div id="camera-master">
        <video id="main-video" playsinline muted autoplay></video>
        <canvas id="main-canvas" style="display:none"></canvas>
    </div>
</div>

<script>
    let isProcessing = false;
    let consoles = [];
    let activeP = null;
    let loginTarget = null;
    let regTarget = 'pA';
    let bpCode = "";
    let sessionScanned = false;

    const game = {
        pass: [],
        pA: { name: "", char: "", role: "", scans: { NEURONAL:null, EM:null, MUTAGENO:null } },
        pB: { name: "", char: "", role: "", scans: { NEURONAL:null, EM:null, MUTAGENO:null } }
    };

    const log = document.getElementById('debug-log');
    const video = document.getElementById('main-video');
    const cam = document.getElementById('camera-master');

    function writeLog(m) { log.innerText = "SYS: " + m; }

    async function bootSystem() {
        writeLog("INICIANDO HARDWARE...");
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
            video.srcObject = stream;
            await video.play();
            
            document.getElementById('camera-anchor-setup').appendChild(cam);
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('setup-screen').style.display = 'flex';
            requestAnimationFrame(tick);
        } catch (e) { alert("Error cámara: " + e); }
    }

    function tick() {
        if (video.readyState === video.HAVE_ENOUGH_DATA && !isProcessing) {
            const canvas = document.getElementById('main-canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            const code = jsQR(ctx.getImageData(0,0,canvas.width,canvas.height).data, canvas.width, canvas.height);
            if (code) handleQR(code.data.toLowerCase());
        }
        requestAnimationFrame(tick);
    }

    function handleQR(data) {
        // 1. CALIBRACIÓN
        if (document.getElementById('setup-screen').style.display === 'flex') {
            if (data.includes("cons_") && !consoles.includes(data)) {
                isProcessing = true;
                consoles.push(data);
                document.getElementById('setup-progress').innerText = consoles.length + "/3";
                if (consoles.length === 3) {
                    game.pass = consoles.map(c => c.split('_').pop());
                    setTimeout(showReg, 800);
                }
                setTimeout(() => isProcessing = false, 1000);
            }
        }
        // 2. REGISTRO PERSONAJE
        else if (document.getElementById('reg-step-card').style.display === 'block') {
            if (data.includes("char_")) {
                isProcessing = true;
                game[regTarget].char = data.split('_')[1];
                game[regTarget].role = ['HUMANO', 'CYBORG', 'ADAPTOID'][Math.floor(Math.random()*3)];
                if (regTarget === 'pA') { regTarget = 'pB'; showReg(); } else { showHub(); }
                setTimeout(() => isProcessing = false, 1500);
            }
        }
        // 3. LOGIN
        else if (loginTarget) {
            if (data.includes(game[loginTarget].char)) {
                isProcessing = true;
                enterTerminal(loginTarget);
                loginTarget = null;
                setTimeout(() => isProcessing = false, 1500);
            }
        }
    }

    // NAVEGACIÓN
    function showReg() {
        hideAll();
        document.getElementById('reg-screen').style.display = 'flex';
        document.getElementById('reg-title').innerText = "REGISTRO " + (regTarget==='pA' ? "JUGADOR A" : "JUGADOR B");
        document.getElementById('reg-step-name').style.display = 'block';
        document.getElementById('reg-step-card').style.display = 'none';
    }

    function confirmName() {
        let n = document.getElementById('reg-input-name').value;
        if (!n) return;
        game[regTarget].name = n.toUpperCase();
        document.getElementById('reg-step-name').style.display = 'none';
        document.getElementById('reg-step-card').style.display = 'block';
        document.getElementById('camera-anchor-reg').appendChild(cam);
        document.getElementById('reg-input-name').value = "";
    }

    function showHub() {
        hideAll();
        document.getElementById('hub-screen').style.display = 'flex';
        document.getElementById('btn-hub-pA').innerText = game.pA.name;
        document.getElementById('btn-hub-pB').innerText = game.pB.name;
        activeP = null;
    }

    function startLogin(p) {
        hideAll();
        loginTarget = p;
        document.getElementById('login-title').innerText = "VINCULANDO: " + game[p].name;
        document.getElementById('login-screen').style.display = 'flex';
        document.getElementById('camera-anchor-login').appendChild(cam);
    }

    function enterTerminal(p) {
        hideAll();
        activeP = p;
        sessionScanned = false;
        document.getElementById('ui-wrapper').style.display = 'flex';
        document.getElementById('camera-anchor-ui').appendChild(cam);
        document.getElementById('display-name').innerText = game[p].name;
        updateUI();
    }

    // ACCIONES TERMINAL
    function startScan(type) {
        if (sessionScanned || game[activeP].scans[type] !== null) return;
        isProcessing = true;
        document.getElementById('scan-line').style.display = 'block';
        // Simulación de animación
        setTimeout(() => {
            document.getElementById('scan-line').style.display = 'none';
            let correct = (type==='NEURONAL' && game[activeP].role==='HUMANO') || (type==='EM' && game[activeP].role==='CYBORG') || (type==='MUTAGENO' && game[activeP].role==='ADAPTOID');
            let res = correct ? 100 : 12;
            game[activeP].scans[type] = res;
            sessionScanned = true;
            document.getElementById('scan-perc').innerText = res + "%";
            document.getElementById('scan-modal').style.display = 'flex';
            updateUI();
            isProcessing = false;
        }, 2000);
    }

    function updateUI() {
        ['NEURONAL', 'EM', 'MUTAGENO'].forEach(t => {
            let val = game[activeP].scans[t];
            document.getElementById('res-'+t).innerText = val !== null ? val + "%" : "--";
            document.getElementById('btn-scan-'+t).disabled = (val !== null || sessionScanned);
        });
    }

    function openBio() {
        window.open(`media/videos/${game[activeP].char}.mp4`, '_blank');
    }

    // BYPASS
    function toggleBypass() {
        let s = document.getElementById('bypass-screen');
        s.style.display = (s.style.display === 'flex') ? 'none' : 'flex';
        bpCode = ""; document.getElementById('bp-display').innerText = "---";
    }
    function bpKey(n) { if(bpCode.length < 3) bpCode += n; document.getElementById('bp-display').innerText = bpCode; }
    function bpClear() { bpCode = ""; document.getElementById('bp-display').innerText = "---"; }
    function bpCheck() {
        let s = game.pass, g = bpCode.split(""), pos=0, num=0, sC=[...s], gC=[...g];
        for(let i=0; i<3; i++) { if(gC[i]===sC[i]) { pos++; sC[i]=null; gC[i]="X"; } }
        for(let i=0; i<3; i++) { if(gC[i]!=="X" && sC.includes(gC[i])) { num++; sC[sC.indexOf(gC[i])]=null; } }
        alert(`POSICIÓN CORRECTA: ${pos}\nNÚMERO CORRECTO: ${num}`);
        bpClear();
    }

    function hideAll() {
        document.querySelectorAll('.modal').forEach(m => m.style.display = 'none');
        document.getElementById('ui-wrapper').style.display = 'none';
    }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }
</script>
</body>
</html>
