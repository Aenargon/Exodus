<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EXODUS - V10.2 REBOOT</title>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <style>
        :root { --crt-green: #2ecc71; --cold-blue: #a0d2eb; --danger-red: #ff3e3e; --bg: #050805; }
        body { background: var(--bg); color: var(--crt-green); font-family: 'Courier New', monospace; margin: 0; overflow: hidden; text-transform: uppercase; }
        .crt-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03)); background-size: 100% 3px, 3px 100%; pointer-events: none; z-index: 5000; }
        .modal { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 5, 0, 0.98); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 3000; padding: 20px; box-sizing: border-box; text-align: center; }
        #ui-wrapper { display: none; flex-direction: column; height: 100vh; position: relative; z-index: 100; }
        #header { height: 50px; border-bottom: 1px solid var(--crt-green); padding: 0 15px; background: rgba(0,20,0,0.9); display: flex; justify-content: space-between; align-items: center; }
        #camera-container { position: relative; height: 40vh; overflow: hidden; background: #000; border-bottom: 2px solid #111; display: flex; align-items: center; justify-content: center; }
        video { width: 100%; height: 100%; object-fit: cover; background: #000; }
        .btn-group { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; padding: 10px; flex-grow: 1; }
        button { background: #0d1a0d; color: var(--crt-green); border: 1px solid var(--crt-green); padding: 15px 5px; font-family: inherit; font-size: 9px; border-radius: 4px; width: 100%; cursor: pointer; }
        .btn-main { padding: 25px; font-size: 1.2rem; border-color: #00ffff; color: #00ffff; width: 85%; font-weight: bold; }
        #debug-log { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(0,0,0,0.8); color: yellow; font-size: 8px; padding: 5px; z-index: 6000; pointer-events: none; }
        .scan-box { border: 2px solid var(--cold-blue); box-shadow: 0 0 15px var(--cold-blue); overflow: hidden; background: #000; }
    </style>
</head>
<body>

<div id="debug-log">SISTEMA LISTO. ESPERANDO INTERACCIÓN...</div>
<div class="crt-overlay"></div>

<div id="start-screen" class="modal" style="display: flex;">
    <h1 style="color: #00ffff; letter-spacing: 5px;">EXODUS</h1>
    <p>V10.2 [EMERGENCY BOOT]</p>
    <button onclick="bootSystem()" class="btn-main">INICIAR MISIÓN</button>
</div>

<div id="setup-screen" class="modal">
    <h2 style="color: var(--cold-blue)">CALIBRACIÓN</h2>
    <div id="setup-progress" style="font-size: 5rem; color: white;">0/3</div>
    <div class="scan-box" style="width: 240px; height: 160px;">
        <video id="setup-video" playsinline muted></video>
    </div>
    <p>ESCANEA CÓDIGOS DE CONSOLA</p>
</div>

<div id="ui-wrapper">
    <div id="header">
        <button onclick="location.reload()" style="width: 70px; font-size: 8px;">RESET</button>
        <span id="player-display" style="color: #00ffff;">TERMINAL</span>
        <button style="width: 70px; font-size: 8px;">BYPASS</button>
    </div>
    <div id="camera-container">
        <video id="video" playsinline muted></video>
        <canvas id="canvas" style="display:none"></canvas>
    </div>
    <div class="btn-group">
        <button style="grid-column: span 3; padding: 20px; margin-bottom: 10px; border-color: #00ffff;">BIO-LOG ACTIVADO</button>
        <button>SCAN NEURONAL</button>
        <button>SCAN ELECTROMAG.</button>
        <button>SCAN MUTÁGENO</button>
    </div>
</div>

<script>
    let isProcessing = false;
    let consoles = [];
    const log = document.getElementById('debug-log');
    
    function writeLog(msg) { log.innerText = "LOG: " + msg; console.log(msg); }

    // 1. FUNCIÓN DE ARRANQUE (Solo tras pulsar el botón)
    async function bootSystem() {
        writeLog("INICIANDO BOOT...");
        try {
            localStorage.clear();
            writeLog("MEMORIA LIMPIA. PIDIENDO CÁMARA...");
            
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "environment" } 
            });

            writeLog("CÁMARA CONCEDIDA.");
            document.getElementById('setup-video').srcObject = stream;
            document.getElementById('video').srcObject = stream;
            
            // Cambiar pantalla
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('setup-screen').style.display = 'flex';
            
            requestAnimationFrame(tick);
        } catch (err) {
            writeLog("ERROR CRÍTICO: " + err.message);
            alert("Error al activar cámara. Revisa los permisos.");
        }
    }

    function tick() {
        const v = document.getElementById('setup-video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        if (v.readyState === v.HAVE_ENOUGH_DATA && !isProcessing) {
            canvas.height = v.videoHeight;
            canvas.width = v.videoWidth;
            ctx.drawImage(v, 0, 0, canvas.width, canvas.height);
            const code = jsQR(ctx.getImageData(0,0,canvas.width,canvas.height).data, canvas.width, canvas.height);
            
            if (code) {
                handleQR(code.data.toLowerCase());
            }
        }
        requestAnimationFrame(tick);
    }

    function handleQR(data) {
        if (isProcessing) return;
        writeLog("QR DETECTADO: " + data);

        if (data.includes("cons_") && !consoles.includes(data)) {
            isProcessing = true;
            consoles.push(data);
            document.getElementById('setup-progress').innerText = consoles.length + "/3";
            
            if (consoles.length === 3) {
                writeLog("CALIBRACIÓN COMPLETA. ENTRANDO...");
                setTimeout(() => {
                    document.getElementById('setup-screen').style.display = 'none';
                    document.getElementById('ui-wrapper').style.display = 'flex';
                }, 1000);
            }
            setTimeout(() => isProcessing = false, 1000);
        }
    }
</script>
</body>
</html>
